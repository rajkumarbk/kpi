<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GlassFlow KPI System{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background:
                linear-gradient(to right, #e5e7eb 1px, transparent 1px),
                linear-gradient(to bottom, #e5e7eb 1px, transparent 1px),
                #f8fafc !important;
            background-size: 20px 20px !important;
            min-height: 100vh;
            position: relative;
            margin: 0 !important;
            padding: 0 !important;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
        }

        /* Container Full Width */
        .container,
        nav .container,
        main.container {
            max-width: 100% !important;
            padding-left: 1.5rem !important;
            padding-right: 1.5rem !important;
        }

        /* Navigation */
        nav.glass-card {
            margin: 0.75rem !important;
            border-radius: 1rem !important;
        }

        /* Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 0 5px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 1.25rem !important;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08), 0 10px 25px rgba(0, 0, 0, 0.05);
            border-color: rgba(139, 92, 246, 0.3);
        }

        .stat-card {
            background: white;
            border-radius: 1.25rem;
            padding: 1.25rem !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.1);
        }

        .stat-card p.text-4xl,
        .stat-card .text-4xl {
            font-size: 1.875rem !important;
        }

        /* Form Elements */
        .form-input,
        select,
        textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            transition: all 0.3s ease;
            background: white;
            font-size: 0.95rem;
        }

        .form-input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        /* Charts */
        .glass-card canvas {
            max-height: 220px !important;
            width: 100% !important;
        }

        /* Grid & Spacing */
        .grid {
            gap: 1rem !important;
        }

        .space-y-6>*+* {
            margin-top: 1rem !important;
        }

        h2.text-3xl {
            font-size: 1.75rem !important;
        }

        /* Table */
        table td,
        table th {
            padding: 0.5rem 1rem !important;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: white;
            color: #4b5563;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
            cursor: pointer;
        }

        .btn-secondary:hover {
            border-color: #8b5cf6;
            color: #8b5cf6;
            transform: translateY(-2px);
        }

        /* Navigation Links */
        .nav-link {
            position: relative;
            padding: 0.5rem 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Animations */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        /* Select2 Styling */
        .select2-container--default .select2-selection--single {
            height: 46px !important;
            border: 2px solid #e5e7eb !important;
            border-radius: 0.75rem !important;
            background-color: white !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered {
            line-height: 46px !important;
            padding-left: 2.5rem !important;
            color: #374151 !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 46px !important;
        }

        .select2-container--default.select2-container--open .select2-selection--single {
            border-color: #8b5cf6 !important;
        }

        .select2-dropdown {
            border: 2px solid #e5e7eb !important;
            border-radius: 0.75rem !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1) !important;
        }

        .select2-results__option--highlighted {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        }
    </style>
</head>

<body>
    <div class="content-wrapper">
        <!-- Animated Background -->
        <div class="fixed inset-0 overflow-hidden pointer-events-none" style="z-index: 0;">
            <div
                class="absolute top-20 left-10 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-xl opacity-20 float-animation">
            </div>
            <div class="absolute bottom-20 right-10 w-96 h-96 bg-blue-300 rounded-full mix-blend-multiply filter blur-xl opacity-20 float-animation"
                style="animation-delay: 1s;"></div>
        </div>

        <!-- Navigation -->
        <nav class="relative z-10 glass-card m-4 p-4">
            <div class="container mx-auto">
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-3">
                            <img src="/static/img/header_salem.png" alt="Company Logo" style="max-height: 60px; width: auto; max-width: 100%;">
                            <!-- <i class="fas fa-company"></i> -->
                    </div>

                    <div class="flex items-center space-x-6">
                        <a href="{% url 'core:dashboard' %}" class="nav-link text-gray-600 hover:text-purple-600">
                            <i class="fas fa-chart-pie mr-2"></i>Dashboard
                        </a>
                        <a href="{% url 'core:add_transaction' %}" class="nav-link text-gray-600 hover:text-purple-600">
                            <i class="fas fa-plus-circle mr-2"></i>New Entry
                        </a>
                        <a href="{% url 'core:transaction_list' %}"
                            class="nav-link text-gray-600 hover:text-purple-600">
                            <i class="fas fa-list mr-2"></i>View All
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="container mx-auto p-4 relative z-10">
            {% if messages %}
            {% for message in messages %}
            <div class="mb-4" data-aos="fade-down">
                <div class="bg-green-50 border-l-4 border-green-500 text-green-700 p-4 rounded-r-lg shadow-md">
                    <div class="flex items-center">
                        <i class="fas fa-check-circle mr-3 text-green-500"></i>
                        <span>{{ message }}</span>
                    </div>
                </div>
            </div>
            {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </main>

        <!-- <footer class="relative z-10 text-center py-6 mt-10">
            <p class="text-gray-600">
                <i class="far fa-copyright"></i> 2026 GlassFlow • Smart KPI Analytics
            </p>
        </footer> -->
    </div>

    <script>
        AOS.init({
            duration: 800,
            once: true,
            offset: 100
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>

</html>
