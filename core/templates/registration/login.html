{% extends 'core/base.html' %}
{% load widget_tweaks %}
{% load static %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="glass-card w-full max-w-md p-8" data-aos="fade-up">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-br from-purple-500 to-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-chart-line text-white text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold gradient-text">Welcome Back</h2>
            <p class="text-gray-500 text-sm mt-1">Sign in to continue</p>
        </div>
        
        <form method="post" class="space-y-6">
    {% csrf_token %}
    
    <div class="field-group">
        <div class="field-label"><i class="fas fa-user"></i>Username</div>
        <div class="field-icon-wrap">
            <i class="field-icon fas fa-user-circle"></i>
            <input type="text" name="username" class="form-input" placeholder="Username" required>
        </div>
    </div>
    
    <div class="field-group">
        <div class="field-label"><i class="fas fa-lock"></i>Password</div>
        <div class="field-icon-wrap">
            <i class="field-icon fas fa-key"></i>
            <input type="password" name="password" class="form-input" placeholder="Password" required>
        </div>
    </div>
    
    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
        <i class="fas fa-exclamation-circle mr-2"></i>{{ error }}
    </div>
    {% endif %}
    
    <button type="submit" class="btn-primary w-full justify-center py-3">
        <i class="fas fa-sign-in-alt mr-2"></i> Sign In
    </button>
</form>
    </div>
</div>
{% endblock %}
